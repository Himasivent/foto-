<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Галерея — переклады школы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0f0f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* ровно как на картинке — белая карточка, тень */
        .card {
            max-width: 480px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            padding: 28px 24px 32px 24px;
        }

        /* ЗАГОЛОВОК "Галерея" */
        .gallery-title {
            font-size: 32px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        /* подзаголовок: "переклады" и "школы" с новой строки */
        .subtitle {
            font-size: 18px;
            font-weight: 500;
            color: #888;
            margin-bottom: 32px;
            line-height: 1.3;
        }

        /* МЕСТО ДЛЯ КАРТИНОК — ГРИД */
        .images-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 8px;
        }

        /* каждый блок для картинки — ровное место */
        .image-slot {
            background: #f5f5f5;
            border-radius: 20px;
            height: 180px;
            width: 100%;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            transition: 0.2s;
            border: 1px solid #eaeaea;
        }

        .image-slot:hover {
            background: #eeeeee;
            border-color: #ccc;
        }

        /* картинка внутри слота */
        .image-slot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* плейсхолдер "+" или иконка фото */
        .placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #bbb;
            font-size: 14px;
            gap: 8px;
        }

        .placeholder svg {
            width: 48px;
            height: 48px;
            stroke: #bbb;
            stroke-width: 1.2;
            fill: none;
        }

        /* кнопка добавления нового слота */
        .add-btn {
            margin-top: 20px;
            background: transparent;
            border: 1.5px dashed #ccc;
            border-radius: 20px;
            padding: 12px;
            width: 100%;
            font-size: 15px;
            color: #888;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .add-btn:hover {
            background: #f9f9f9;
            border-color: #aaa;
            color: #666;
        }

        /* скрытый инпут */
        .hidden-input {
            display: none;
        }

        /* маленький хинт */
        .hint {
            margin-top: 20px;
            font-size: 11px;
            color: #bbb;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="card">
    <!-- ЗАГОЛОВОК "Галерея" -->
    <div class="gallery-title">Галерея</div>
    
    <!-- ПОДЗАГОЛОВОК: "переклады" и "школы" с новой строки как на картинке -->
    <div class="subtitle">
        переклады<br>
        школы
    </div>

    <!-- КОНТЕЙНЕР ДЛЯ КАРТИНОК (пустые места) -->
    <div class="images-grid" id="imagesGrid"></div>

    <!-- КНОПКА ДОБАВИТЬ НОВЫЙ СЛОТ -->
    <button class="add-btn" id="addSlotBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12h14"/>
        </svg>
        Добавить картинку
    </button>
    <div class="hint">👇 Нажми на серую область, чтобы добавить своё фото</div>
</div>

<script>
    // Массив слотов: каждый слот хранит URL картинки (null = пусто)
    let slots = [];

    // Загрузка из localStorage
    function loadFromStorage() {
        const saved = localStorage.getItem("gallery_slots");
        if (saved) {
            try {
                slots = JSON.parse(saved);
                // убедимся, что каждый слот имеет корректный формат
                if (!Array.isArray(slots)) slots = [];
                slots = slots.map(s => ({ imageUrl: s.imageUrl || null }));
            } catch(e) { slots = []; }
        }
        // Если совсем пусто — создаём 4 пустых слота (как на картинке, места для картинок)
        if (slots.length === 0) {
            slots = [
                { imageUrl: null },
                { imageUrl: null },
                { imageUrl: null },
                { imageUrl: null }
            ];
        }
    }

    function saveToStorage() {
        localStorage.setItem("gallery_slots", JSON.stringify(slots));
    }

    // Рендер всех слотов
    function renderSlots() {
        const grid = document.getElementById("imagesGrid");
        if (!grid) return;
        grid.innerHTML = "";

        slots.forEach((slot, index) => {
            const slotDiv = document.createElement("div");
            slotDiv.className = "image-slot";
            
            // скрытый инпут для загрузки файла
            const fileInput = document.createElement("input");
            fileInput.type = "file";
            fileInput.accept = "image/jpeg, image/png, image/webp, image/gif, image/jpg";
            fileInput.className = "hidden-input";
            
            // контейнер для содержимого (картинка или плейсхолдер)
            const contentDiv = document.createElement("div");
            contentDiv.style.width = "100%";
            contentDiv.style.height = "100%";
            
            function updateContent() {
                contentDiv.innerHTML = "";
                if (slot.imageUrl && slot.imageUrl.trim() !== "") {
                    const img = document.createElement("img");
                    img.src = slot.imageUrl;
                    img.style.width = "100%";
                    img.style.height = "100%";
                    img.style.objectFit = "cover";
                    img.onerror = () => {
                        // если картинка битая, удаляем её
                        slot.imageUrl = null;
                        saveToStorage();
                        updateContent();
                    };
                    contentDiv.appendChild(img);
                } else {
                    // пустой плейсхолдер — место под картинку
                    const placeholder = document.createElement("div");
                    placeholder.className = "placeholder";
                    placeholder.innerHTML = `
                        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2">
                            <rect x="2" y="2" width="20" height="20" rx="2.18" />
                            <circle cx="8.5" cy="8.5" r="2.5" />
                            <path d="M21 15l-5-4-3 3-4-4-5 5" />
                        </svg>
                        <span>📸 Фото</span>
                    `;
                    contentDiv.appendChild(placeholder);
                }
            }
            
            // загрузка картинки из файла
            function loadImage(file) {
                if (file && file.type.startsWith("image/")) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        slot.imageUrl = e.target.result;
                        saveToStorage();
                        updateContent();
                    };
                    reader.readAsDataURL(file);
                } else {
                    alert("Выберите изображение (PNG, JPG, GIF, WEBP)");
                }
            }
            
            fileInput.onchange = (e) => {
                if (e.target.files && e.target.files[0]) {
                    loadImage(e.target.files[0]);
                }
                fileInput.value = "";
            };
            
            // клик по слоту — загрузить картинку
            slotDiv.addEventListener("click", (e) => {
                e.stopPropagation();
                fileInput.click();
            });
            
            // Drag & drop на слот
            slotDiv.addEventListener("dragover", (e) => {
                e.preventDefault();
                slotDiv.style.background = "#e8e8e8";
            });
            slotDiv.addEventListener("dragleave", () => {
                slotDiv.style.background = "";
            });
            slotDiv.addEventListener("drop", (e) => {
                e.preventDefault();
                slotDiv.style.background = "";
                const files = e.dataTransfer.files;
                if (files && files.length > 0 && files[0].type.startsWith("image/")) {
                    loadImage(files[0]);
                } else {
                    alert("Перетащите изображение");
                }
            });
            
            // правый клик — удалить картинку
            slotDiv.addEventListener("contextmenu", (e) => {
                e.preventDefault();
                if (slot.imageUrl) {
                    if (confirm("Удалить картинку?")) {
                        slot.imageUrl = null;
                        saveToStorage();
                        updateContent();
                    }
                }
            });
            
            slotDiv.appendChild(contentDiv);
            slotDiv.appendChild(fileInput);
            grid.appendChild(slotDiv);
        });
    }

    // добавить новый пустой слот
    function addNewSlot() {
        slots.push({ imageUrl: null });
        saveToStorage();
        renderSlots();
    }

    // инициализация
    function init() {
        loadFromStorage();
        renderSlots();
        
        const addBtn = document.getElementById("addSlotBtn");
        if (addBtn) {
            addBtn.addEventListener("click", addNewSlot);
        }
    }
    
    init();
</script>
</body>
</html>
