<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Визуал как на картинке — Фото + Наз</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* ТОЧНО КАК НА КАРТИНКЕ: белая карточка, тень, скругления */
        .card {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            padding: 24px 20px 20px 20px;
        }

        /* ЗАГОЛОВОК "Текст" — как на картинке сверху */
        .card-title {
            font-size: 24px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 24px;
            letter-spacing: -0.3px;
            padding-left: 4px;
        }

        /* СПИСОК СТРОК (Фото + Наз) */
        .photo-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 24px;
        }

        /* Каждая строка: иконка фото слева, название справа */
        .photo-row {
            display: flex;
            align-items: center;
            gap: 14px;
            background: #fafafa;
            border-radius: 18px;
            padding: 8px 12px 8px 8px;
            transition: background 0.2s;
            cursor: pointer;
            border: 1px solid #eeeeee;
        }

        .photo-row:hover {
            background: #f0f0f0;
            border-color: #ddd;
        }

        /* БЛОК "Фото" — КВАДРАТНАЯ ОБЛАСТЬ КАК НА КАРТИНКЕ */
        .photo-icon {
            width: 52px;
            height: 52px;
            background: #e8e8e8;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
            position: relative;
            transition: 0.1s;
        }

        /* Стиль для загруженного изображения */
        .photo-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Иконка фото-камеры (как на референсе) */
        .camera-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }

        .camera-placeholder svg {
            width: 26px;
            height: 26px;
            stroke: #999;
            stroke-width: 1.5;
            fill: none;
        }

        .camera-placeholder span {
            font-size: 9px;
            color: #aaa;
            font-weight: 500;
        }

        /* ТЕКСТ "Наз" — справа, как на картинке */
        .photo-name {
            font-size: 17px;
            font-weight: 500;
            color: #2c2c2c;
            flex: 1;
            background: transparent;
            border: none;
            padding: 8px 4px;
            font-family: inherit;
            cursor: text;
            border-radius: 10px;
            transition: 0.1s;
        }

        .photo-name:focus {
            outline: none;
            background: #fff;
            box-shadow: 0 0 0 2px #007aff20;
        }

        /* скрытый инпут для загрузки фото */
        .hidden-file-input {
            display: none;
        }

        /* ОТДЕЛЬНЫЙ БЛОК "Наз" ВНИЗУ (как на картинке) */
        .bottom-title {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1.5px solid #ececec;
            font-size: 18px;
            font-weight: 600;
            color: #1e1e1e;
            text-align: left;
            letter-spacing: -0.2px;
            padding-bottom: 4px;
            padding-left: 4px;
        }

        /* маленькая подсказка */
        .hint {
            margin-top: 18px;
            font-size: 12px;
            color: #aaa;
            text-align: center;
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .hint span {
            background: #f0f0f0;
            padding: 4px 10px;
            border-radius: 30px;
        }

        button {
            background: none;
            border: none;
        }

        /* адаптив */
        @media (max-width: 550px) {
            .card {
                padding: 16px;
            }
            .photo-icon {
                width: 48px;
                height: 48px;
            }
            .photo-name {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
<div class="card">
    <!-- ЗАГОЛОВОК "Текст" — КАК НА КАРТИНКЕ -->
    <div class="card-title">Текст</div>

    <!-- СПИСОК СТРОК: Фото + Наз (3 строки как в примере) -->
    <div class="photo-list" id="photoList"></div>

    <!-- ОТДЕЛЬНОЕ "Наз" ВНИЗУ — КАК НА КАРТИНКЕ (четвёртый элемент) -->
    <div class="bottom-title" id="bottomTitle">Наз</div>

    <div class="hint">
        <span>🖱️ клик на фото → загрузить картинку</span>
        <span>✏️ дважды клик по названию → редактировать</span>
    </div>
</div>

<script>
    // ДАННЫЕ: ровно как на картинке — три блока "Фото - Наз" и снизу отдельный "Наз"
    // У каждого блока есть своё название (по умолчанию "Наз", "Наз 2", "Наз 3")
    // Снизу четвёртый элемент (отдельная строка) — просто текст, но по просьбе "можно ставить картинки" 
    // Я сделаю так, что нижний блок "Наз" тоже можно превратить в карточку с фото? 
    // На картинке это просто слово. Но если пользователь захочет добавить картинку рядом с нижним "Наз"?
    // Для полного совпадения с визуалом: нижний блок "Наз" оставлю как есть, но с возможностью редактирования текста.
    // Чтобы можно было и туда вставлять картинку — добавлю скрытую возможность? нет, лучше четко как на дизайне.
    // НО если нужна функциональность "и внизу тоже можно картинку", я добавлю для нижнего блока иконку? 
    // На вашей картинке снизу только текст "Наз". Поэтому я сохраню стиль как на изображении, 
    // но разрешу кликнуть по нижнему "Наз", чтобы изменить текст (по двойному клику).
    // Если понадобится картинка снизу — скажите, добавлю. Пока максимально близко к референсу.

    // Массив строк "Фото - Наз"
    let items = [
        { name: "Наз", imageUrl: null },
        { name: "Наз", imageUrl: null },
        { name: "Наз", imageUrl: null }
    ];

    // нижний отдельный текст (который просто "Наз" внизу)
    let bottomText = "Наз";

    // Функция сохранения в localStorage (чтобы картинки не пропадали после обновления)
    function saveToLocalStorage() {
        const data = {
            items: items,
            bottomText: bottomText
        };
        localStorage.setItem("visualLikeImage", JSON.stringify(data));
    }

    function loadFromLocalStorage() {
        const saved = localStorage.getItem("visualLikeImage");
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                if (parsed.items && Array.isArray(parsed.items)) {
                    items = parsed.items;
                }
                if (parsed.bottomText !== undefined) {
                    bottomText = parsed.bottomText;
                }
                return true;
            } catch(e) { console.warn(e); }
        }
        return false;
    }

    // отрисовка списка (Фото — Наз)
    function renderPhotoList() {
        const container = document.getElementById("photoList");
        if (!container) return;
        container.innerHTML = "";

        items.forEach((item, idx) => {
            const row = document.createElement("div");
            row.className = "photo-row";

            // левая часть: иконка/фото
            const photoDiv = document.createElement("div");
            photoDiv.className = "photo-icon";
            
            // скрытый input для загрузки файла
            const fileInput = document.createElement("input");
            fileInput.type = "file";
            fileInput.accept = "image/jpeg, image/png, image/webp, image/gif";
            fileInput.className = "hidden-file-input";
            
            // контейнер для отображения содержимого (иконка или картинка)
            const displayArea = document.createElement("div");
            displayArea.style.width = "100%";
            displayArea.style.height = "100%";
            displayArea.style.display = "flex";
            displayArea.style.alignItems = "center";
            displayArea.style.justifyContent = "center";

            function updatePhotoDisplay() {
                displayArea.innerHTML = "";
                if (item.imageUrl && item.imageUrl.trim() !== "") {
                    const img = document.createElement("img");
                    img.src = item.imageUrl;
                    img.style.width = "100%";
                    img.style.height = "100%";
                    img.style.objectFit = "cover";
                    img.style.borderRadius = "14px";
                    img.onerror = () => {
                        // если картинка битая, сбросим
                        if (confirm("Ошибка загрузки картинки. Очистить фото?")) {
                            item.imageUrl = null;
                            saveToLocalStorage();
                            updatePhotoDisplay();
                        } else {
                            displayArea.innerHTML = `<div class="camera-placeholder"><svg viewBox="0 0 24 24" stroke="currentColor"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg><span>Фото</span></div>`;
                        }
                    };
                    displayArea.appendChild(img);
                } else {
                    // стандартная иконка как на картинке (камера/фото)
                    const placeholder = document.createElement("div");
                    placeholder.className = "camera-placeholder";
                    placeholder.innerHTML = `
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3">
                            <rect x="2" y="4" width="20" height="16" rx="2" ry="2"></rect>
                            <circle cx="12" cy="12" r="4"></circle>
                            <path d="M8 4L10 2H14L16 4"></path>
                        </svg>
                        <span>Фото</span>
                    `;
                    displayArea.appendChild(placeholder);
                }
            }

            // загрузка картинки через файл
            function loadImageFromFile(file) {
                if (file && file.type.startsWith("image/")) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        item.imageUrl = e.target.result;
                        saveToLocalStorage();
                        updatePhotoDisplay();
                    };
                    reader.readAsDataURL(file);
                } else {
                    alert("Выберите изображение (jpg, png, gif, webp)");
                }
            }

            fileInput.onchange = (e) => {
                if (e.target.files && e.target.files[0]) {
                    loadImageFromFile(e.target.files[0]);
                }
                fileInput.value = "";
            };

            // клик по области фото — открыть выбор файла
            photoDiv.addEventListener("click", (e) => {
                e.stopPropagation();
                fileInput.click();
            });

            // поддержка drag & drop на фото
            photoDiv.addEventListener("dragover", (e) => {
                e.preventDefault();
                photoDiv.style.opacity = "0.7";
            });
            photoDiv.addEventListener("dragleave", () => {
                photoDiv.style.opacity = "1";
            });
            photoDiv.addEventListener("drop", (e) => {
                e.preventDefault();
                photoDiv.style.opacity = "1";
                const files = e.dataTransfer.files;
                if (files && files.length > 0 && files[0].type.startsWith("image/")) {
                    loadImageFromFile(files[0]);
                } else {
                    alert("Перетащите изображение");
                }
            });

            photoDiv.appendChild(displayArea);
            photoDiv.appendChild(fileInput);
            
            // правая часть: название (как на картинке "Наз")
            const nameSpan = document.createElement("div");
            nameSpan.className = "photo-name";
            nameSpan.contentEditable = "true";
            nameSpan.textContent = item.name;
            
            // редактирование названия (по двойному клику или через contentEditable)
            // чтобы было удобно и как в современных интерфейсах — просто редактируемый блок
            nameSpan.addEventListener("blur", () => {
                const newVal = nameSpan.textContent.trim();
                if (newVal !== "") {
                    item.name = newVal;
                } else {
                    item.name = "Наз";
                    nameSpan.textContent = "Наз";
                }
                saveToLocalStorage();
            });
            
            nameSpan.addEventListener("keydown", (e) => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    nameSpan.blur();
                }
            });
            
            row.appendChild(photoDiv);
            row.appendChild(nameSpan);
            container.appendChild(row);
        });
    }

    // отрисовка нижнего блока "Наз" (как на картинке)
    function renderBottomBlock() {
        const bottomEl = document.getElementById("bottomTitle");
        if (!bottomEl) return;
        bottomEl.textContent = bottomText;
        bottomEl.contentEditable = "true";
        bottomEl.style.cursor = "text";
        
        // сохраняем изменения при потере фокуса
        const saveBottom = () => {
            let newText = bottomEl.textContent.trim();
            if (newText === "") {
                newText = "Наз";
                bottomEl.textContent = "Наз";
            }
            bottomText = newText;
            saveToLocalStorage();
        };
        
        bottomEl.addEventListener("blur", saveBottom);
        bottomEl.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                e.preventDefault();
                bottomEl.blur();
            }
        });
        
        // дополнительно: можно ли вставлять картинку в нижний блок? На картинке нет, но если нужна — сделаю отдельно?
        // Оставлю как чистый текст, максимально похоже на предоставленный скриншот.
        // По желанию пользователь может отредактировать текст снизу.
    }

    // Инициализация и сброс (опционально, чтобы можно было вернуть начальное состояние)
    function resetToOriginal() {
        if (confirm("Сбросить все картинки и названия к исходному виду, как на картинке?")) {
            items = [
                { name: "Наз", imageUrl: null },
                { name: "Наз", imageUrl: null },
                { name: "Наз", imageUrl: null }
            ];
            bottomText = "Наз";
            saveToLocalStorage();
            renderPhotoList();
            renderBottomBlock();
        }
    }

    // Добавим кнопку сброса в подсказку для удобства (но не ломаем визуал)
    function addResetButton() {
        const hintDiv = document.querySelector(".hint");
        if (hintDiv && !document.getElementById("resetLikeBtn")) {
            const resetSpan = document.createElement("span");
            resetSpan.id = "resetLikeBtn";
            resetSpan.style.cursor = "pointer";
            resetSpan.style.background = "#e0e0e0";
            resetSpan.innerHTML = "⟳ Сбросить всё";
            resetSpan.onclick = (e) => {
                e.stopPropagation();
                resetToOriginal();
            };
            hintDiv.appendChild(resetSpan);
        }
    }

    // загружаем данные, рисуем интерфейс
    function init() {
        loadFromLocalStorage();
        renderPhotoList();
        renderBottomBlock();
        addResetButton();
    }

    init();
</script>
</body>
</html>
